version: '3.8'

services:
  # Audio Gateway - External facing service
  audio-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: audio-gateway
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - API_KEYS=${API_KEYS:-dev-key-1,dev-key-2}
      - STT_SERVICE_URL=http://stt-service:3005
      - TTS_SERVICE_URL=http://tts-service:3006
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - external
      - internal
    depends_on:
      - stt-service
      - tts-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # STT Service - Internal only
  stt-service:
    build:
      context: .
      dockerfile: services/stt-service/Dockerfile
    container_name: stt-service
    expose:
      - "3005"
    environment:
      - PORT=3005
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - STT_MODEL=${STT_MODEL:-whisper-small}
      - MAX_CONCURRENCY=${STT_MAX_CONCURRENCY:-3}
      - MAX_AUDIO_MB=${MAX_AUDIO_MB:-25}
      - MAX_AUDIO_SECONDS=${MAX_AUDIO_SECONDS:-300}
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # TTS Service - Internal only
  tts-service:
    build:
      context: .
      dockerfile: services/tts-service/Dockerfile
    container_name: tts-service
    expose:
      - "3006"
    environment:
      - PORT=3006
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - TTS_MODEL=${TTS_MODEL:-xtts}
      - MAX_CONCURRENCY=${TTS_MAX_CONCURRENCY:-5}
      - MAX_TEXT_CHARS=${MAX_TEXT_CHARS:-5000}
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis - Internal only
  redis:
    image: redis:7-alpine
    container_name: audio-redis
    expose:
      - "6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  # External network - accessible from host and other compose projects
  external:
    name: socialcue-external
    external: true
  
  # Internal network - isolated, no host access
  internal:
    driver: bridge
    internal: true

volumes:
  redis-data:
    driver: local
